<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Library — Overview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface-2: #1e2436;
    --border: #2a3147;
    --border-active: #4a5580;
    --text: #e8ecf4;
    --muted: #7a8499;
    --accent-1: #4f8aff;
    --accent-2: #7c5cfc;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    max-width: 640px;
    width: 100%;
    text-align: center;
  }

  .label {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #4f8aff, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 3rem;
    line-height: 1.6;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem 1.5rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-align: left;
  }

  .card:hover {
    border-color: var(--border-active);
    background: var(--surface-2);
    transform: translateY(-2px);
  }

  .card-icon {
    font-size: 1.75rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.4rem;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-arrow {
    display: inline-block;
    margin-top: 1rem;
    font-size: 0.8rem;
    font-family: var(--mono);
    color: var(--accent-1);
  }
</style>
</head>
<body>
  <div class="container">
    <p class="label">deepset · Skills Library</p>
    <h1>Architecture Docs</h1>
    <p class="subtitle">Design documents for the Skills Library system.</p>
    <div class="cards">
      <a href="comparison.html" class="card">
        <div class="card-icon">⚖️</div>
        <div class="card-title">Team Decision</div>
        <div class="card-desc">Architecture options comparison to guide the team decision.</div>
        <span class="card-arrow">Open →</span>
      </a>
      <a href="skills-library-architecture.html" class="card">
        <div class="card-icon">🏗️</div>
        <div class="card-title">Architecture Plan</div>
        <div class="card-desc">Full architecture and implementation plan for the Skills Library.</div>
        <span class="card-arrow">Open →</span>
      </a>
    </div>
  </div>
</body>
</html>
